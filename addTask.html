<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加新任务</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background: linear-gradient(145deg, rgb(230, 234, 249) 0%, #edf5ff 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3vw;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    .inputBar span {
        display: block;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 3.5vw;
        border: 0.2vw solid transparent;
        font: bold;
        font-size: 1.5vw;
    }

    .inputBar input {
        border: solid gray;
        background: transparent;
        padding: 2vw 1.5vw;
        font-size: 2.5vw;
        color: #222e41;
        transition: all 0.2s;
        border-radius: 0px 15px 15px 15px;
    }

    .addBtn {
        pointer-events: auto;
        margin-top: 5vh;
        /* border: solid rgb(84, 84, 84); */
        display: flex;
        justify-content: center;
        padding: 2vw;
        width: 33.7vw;
        border-radius: 20px;
    }
</style>

<body>

    <ul>
        <div>
            <h3>
                添加新任务
            </h3>
        </div>

        <div class="inputBar">
            <span>title</span>
            <input type="text" id="tle" placeholder="标题">
        </div>
        <div class="inputBar">
            <span>description</span>
            <input type="text" id="des" placeholder="描述">
        </div>
        <div class="inputBar">
            <span>priority</span>
            <input type="text" id="pri" placeholder="优先级">
        </div>
        <div class="inputBar">
            <span>time</span>
            <input type="text" size="4" id="stYear" placeholder="年">
            <input type="text" size="4" id="stMon" placeholder="月">
            <input type="text" size="4" id="stDay" placeholder="日">
            <span style="text-align: center;width: 50px;margin-top: 0vw;">-</span>
            <input type="text" size="4" id="edYear" placeholder="年">
            <input type="text" size="4" id="edMon" placeholder="月">
            <input type="text" size="4" id="edDay" placeholder="日">
        </div>
        <div class="inputBar">
            <span>type</span>
            <input type="text" placeholder="分类">
        </div>
        <div>
            <button class='addBtn' onclick="addTask()">ADD</button>
        </div>
    </ul>
</body>

<script>
    function addTask() {
        const data = {
            title: document.getElementById('tle').value,
            description: document.getElementById('tle').value,
            priority: document.getElementById('tle').value,
            stYear: document.getElementById('tle').value,
            stMon: document.getElementById('tle').value,
            stDay: document.getElementById('tle').value,
            edYear: document.getElementById('tle').value,
            edMon: document.getElementById('tle').value,
            edDay: document.getElementById('tle').value,
            type: document.getElementById('tle').value
        }

        console.log('taskdata', data);
        console.log('tile', data.title);
        console.log('description', data.description);
        console.log('priority', data.priority);
        console.log('startTime', data.stYear, ' ', data.stMon, ' ', data.stDay);
        console.log('endtime', data.edYear, ' ', data.edMon, ' ', data.edDay);
        console.log('type', data.type);
    }

</script>

</html>
