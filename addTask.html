<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加新任务</title>
</head>

<style>
    /* 重置默认样式 */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        /* 背景颜色 */
        background: rgb(230, 234, 249);
        min-height: 100%;
        /* flex布局 */
        display: flex;
        /* 垂直居中 */
        align-items: center;
        /* 水平居中 */
        justify-content: center;
        /* 内边距 */
        padding: 5%;
        /* 字体 默认值 */
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    /* 输入框上方标签 */
    .inputBar span {
        /* 提升为块级元素，独占一行 */
        display: block;
        /* 居中 */
        align-items: center;
        flex-wrap: wrap;
        /* 上边距，这样可以紧挨着下方的输入框而远离上方的输入框 */
        margin-top: 3%;
        /* 无边框 */
        border: transparent;
        /* 加粗 */
        font: bold;
        /* 字体大小 */
        font-size: 15px;
    }

    .inputBar input {
        /* 上 外边距 */
        margin-top: 3px;
        /* 边框灰 */
        border: solid gray;
        /* 透明背景 */
        background: transparent;
        /* 内边距 */
        padding: 20px 15px;
        /* 字体大小 */
        font-size: 25px;
        /* 颜色 */
        color: #222e41;
        /* 属性变化时 在0.2秒内平滑过渡 */
        transition: all 0.2s;
        /* 圆角设置，左上尖，其余三个圆 */
        border-radius: 0px 15px 15px 15px;
    }

    #pri {
        /* 提升为块级元素 */
        display: block;
        /* 宽度  父类的100% */
        width: 100%;
        /* 高度 视口高度的5% */
        height: 5vh;
        /* 上下外边距 */
        margin-top: 4%;
        margin-bottom: 10%;
        /* 背景颜色 比大的背景稍白一点 */
        background-color: rgb(240, 242, 249);
        /* 圆角 */
        border-radius: 0px 15px 15px 15px;
        /* 文本居中 */
        text-align-last: center;
    }

    input[type="date"] {
        /* 字体大小 */
        font-size: 100%;
        /* 粗体 */
        font: bold;
        /* 继承页面字体 */
        font-family: inherit;
    }

    .addBtn {
        /* 上 外边距 */
        margin-top: 40px;
        /* flex布局 暂时没什么作用 */
        display: flex;
        /* 文本水平居中 */
        justify-content: center;
        /* 内边距 */
        padding: 5%;
        /* 宽度：视口宽度的33% */
        width: 100%;
        /* 圆角 */
        border-radius: 20px;
    }

    .return {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        /* 圆形 */
        background-color: #f0f0f0;
        /* 鲜艳底色 */
        color: rgb(0, 0, 0);
        font-size: 18px;
        font-weight: bold;
        display: inline-flex;
        /*文字居中*/
        align-items: center;
        justify-content: center;
        border: 3px solid rgb(63, 63, 63);
        cursor: pointer;
        transition: opacity 0.2s ease, transform 0.1s ease;
        /* 过渡效果 */
        outline: none;
        /* 去掉默认焦点轮廓 */
    }
</style>

<body>

    <ul>
        <div>
            <a href="MainInterface.html" style="text-decoration: none; display: inline-block;">
                <button class="return">
                    < </button>
            </a>
            <h3 style="display: inline-block;">添加新任务</h3>
        </div>

        <div class="inputBar">
            <span>title</span>
            <input type="text" id="tle" placeholder="标题">
        </div>

        <div class="inputBar">
            <span>description</span>
            <input type="text" id="des" placeholder="描述">
        </div>

        <div class="inputBar">
            <span>priority</span>
            <select id="pri">
                <option value="3">高</option>
                <option value="2">中</option>
                <option value="1">低</option>
            </select>
        </div>

        <div class="inputBar">
            <span>time</span>
            <input id="stTime" type="date">
            <span style="text-align: center;width: 50px;margin-top: 0vw;">—</span>
            <input id="edTime" type="date">
        </div>

        <div class="inputBar">
            <span>type</span>
            <input type="text" id="type" placeholder="分类">
        </div>

        <div>
            <button class='addBtn' onclick="addTask()">ADD</button>
        </div>
    </ul>
</body>

<script>
    class EventItem {
        constructor(title, description = '', priority = 3, start, end,type, completed = false) {
            // 生成一个唯一ID
            this.id = Date.now() + Math.floor(Math.random() * 1000);

            //  其他数据初始化
            this.title = title;
            this.description = description;
            this.priority = priority;
            this.start = start;
            this.end = end;
            this.type = type;
            this.completed = completed;
        }

        Complete() {
            this.completed = true;
        }

        Uncomplete() {
            this.completed = false;
        }
    }

    // 本地存储实现
    const STORAGE_KEY = 'events';

    // 存储数据
    function saveEvents(events) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    }

    // 读取数据
    function loadEvents() {
        const Data = localStorage.getItem(STORAGE_KEY);
        if (!Data) return [];

        try {
            // JSON parse得到的是普通Object
            const parseArray = JSON.parse(Data);
            // 还原为Event对象
            return parseArray.map(item => {
                item.title;
                item.description;
                item.priority;
                item.start;
                item.end;
                item.completed;
            });
        } catch (e) {
            console.error('读取存储失败', e);
            return [];
        }
    }

    // 收集所有数据 在控制台打印
    function addTask() {
        data = {
            title: document.getElementById('tle').value,
            description: document.getElementById('des').value,
            priority: document.getElementById('pri').value,
            stTime: document.getElementById('stTime').value,
            edTime: document.getElementById('edTime').value,
            type: document.getElementById('type').value
        }

        let task = new EventItem(
            data.title,
            data.description,
            data.priority,
            data.stTime,
            data.edTime,
            data.type
        );


        // 数值合理性检验 标题 起止时间不能为空
        // EventItem的priority默认值是3，description默认值是'',completed默认值是false
        if (!data.title || data.title === '') { alert('标题不能为空'); return; }
        if (!data.stTime || data.stTime === '') { alert('开始时间不能为空'); return; }
        if (!data.edTime || data.edTime === '') { alert('结束时间不能为空'); return; }

        // 保存数据
        saveEvents(task);

        // 控制台打印
        console.log('taskdata', data);
        console.log('tile', data.title);
        console.log('description', data.description);
        console.log('priority', data.priority);
        console.log('startTime', data.stTime);
        console.log('endtime', data.edTime);
        console.log('type', data.type);

        //与后端连接
        fetch('http://localhost:8080/api/addTask', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(task)
        }).then(response => response.json())
        .then(result => {
                console.log('Success:', result);
                console.log('code:', result.code);
                console.log('message:', result.message);   
                // 可以在这里处理后端返回的数据，例如显示成功消息
        })
        .catch(error => {
                console.error('Error:', error);
                // 可以在这里处理错误，例如显示错误消息
        });
    }

</script>

</html>
