<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日程管理系统</title>
    <style>
        /*头部块，内涵.week-date-tools块*/
        .func-header {
            width: 100%;
            box-sizing: border-box;
            height: 60px;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }
        /*头部内的工具块，包含周数、日期和工具图标*/
        /*周数显示样式*/
        .func-header .week {/*左贴紧*/
            justify-self: start;
            grid-column: 1;
            font-weight: bold;
        }
        /*日期显示样式*/
        .func-header .full-date {/*居中*/
            justify-self: center;
            grid-column: 2;
            font-size: 18px;
        }
        /*工具图标样式*/
        .func-header .tools{/*右flex布局*/
            justify-self:right;
            display: flex;
            grid-column: 3;
            gap: 3px;
        }
        .func-header .tools .btn{
            width: 30px;
            height: 30px;
            border-radius: 50%;          /* 圆形 */
            background-color: #f0f0f0;   /* 鲜艳底色 */
            color: rgb(0, 0, 0);
            font-size: 18px;
            font-weight: bold;
            display: inline-flex;/*文字居中*/
            align-items: center;
            justify-content: center;
            border: 3px solid rgb(63, 63, 63);
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;  /* 过渡效果 */
            outline: none;               /* 去掉默认焦点轮廓 */
        }
        .func-header .tools .btn:active{
            opacity: 0.6;               /* 透明度降低，看起来变淡 */
            transform: scale(0.98);     /* 轻微缩小，增强按压感 */
        }
        /*中部块，内涵.calendar块,.schedule-list块*/
        .func-body {
            width: 100%;
            height: 700px; /*示例高度*/
            background-color: rgb(46,89,167);
            border-radius: 8px;
            position: relative;
        }
        /*日程列表块样式，内涵.schedule-item日程项块*/
        .func-body .schedule-list {
            /*日程列表样式*/
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            background-image: url(17754068327512c7f6b870d76ea31f9c2f0b37c931503ce1c.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            overflow-y: auto; /*内容过多时显示滚动条*/
            contain: layout paint;
            padding: 20px 0px;/*内边距,只垂直方向*/ 
            position: relative;
        }
        /*日程项样式，内涵概要块和内容块*/
        .func-body .schedule-list .schedule-item {
            /*示例日程项样式*/
            background-color: rgba(96, 181, 255, 0.5);
            height: 70px;
            width: 100%;
            /*日程项之间的间距*/
            margin-bottom: 5px;
            border-radius: 6px;
            /*概要块和内容块的水平排列*/
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        /*日程项内的概要块*/
        .func-body .schedule-list .schedule-item .schedule-summary {
            width: 7%;
            height: 70%;
            border-radius: 6px;
            background-color: rgba(136,171,218, 0.7);
        }
        /*日程项内的内容块*/
        .func-body .schedule-list .schedule-item .schedule-content {
            width: 93%;
            height: 70%;  
            border-radius: 6px;  
            background-color: rgba(111,148,205, 0.7);
        }
        /*日历条样式，内涵date-cell日期块*/
        .func-body .calendar {
            margin-left: 7%; /* 让日历条与竖线保持对齐 */
            width: 93%;
            height: 100px;
            background-color: rgb(89,118,186);

            /*子块排列方式*/
            display: flex;
            flex-direction: row;/*让日期横向排列*/
            justify-content: space-between;/*日期之间平均分布*/
        }
        /*每个日期块样式，含星期、日期和月份*/
        .func-body .calendar .date-cell {
            background-color: rgb(89,118,186);
            flex-basis: 13%;/*每个日期占一周的1/7*/
            text-align: center;
            padding: 10px;/*增加内边距，即日期之间的间距*/
            display: flex;
            flex-direction: column;/*让星期、日期和月份垂直排列*/
            border-left: 1px solid #ccc;/*日期之间的分隔线*/
        }
        
    </style>
</head>
<body>
    <!--创建头部块，包含周数、日期和工具图标-->
    <header class="func-header">
            <span class="week" id="weekday"></span>
            <span class="full-date" id="date"></span>
            <span class="tools">
                <span class="btn" id="add">+</span>
                <span class="btn" id="search">?</span>
                <span class="btn" id="more">...</span>
            </span>
    </header>
    <!--*创建中部块，包含日历条和日程列表-->
    <div class="func-body">
        <!--日历条，包含日期块-->
        <div class="calendar">
            <!--每个日期块包含星期、日期和月份-->
            <div class="date-cell">
                <span class="weekday">一</span>
                <span class="day-num">day</span>
                <span class="month">3月</span>
            </div>
            <div class="date-cell">
                <span class="weekday">二</span>
                <span class="day-num">day</span>
                <span class="month">3月</span>
            </div>
            <div class="date-cell">
                <span class="weekday">三</span>
                <span class="day-num">day</span>
                <span class="month">4月</span>
            </div>
            <div class="date-cell">
                <span class="weekday">四</span>
                <span class="day-num">day</span>
                <span class="month">4月</span>
            </div>
            <div class="date-cell">
                <span class="weekday">五</span>
                <span class="day-num">day</span>
                <span class="month">4月</span>
            </div>
            <div class="date-cell">
                <span class="weekday">六</span>
                <span class="day-num">day</span>
                <span class="month">4月</span>
            </div>
            <div class="date-cell">
                <span class="weekday">日</span>
                <span class="day-num">day</span>
                <span class="month">4月</span>
            </div>
        </div>
        <!--日程列表，包含多个日程项-->
        <div class="schedule-list">
            <!--每个日程项包含概要块和内容块-->
            <div class="schedule-item">
                <!--概要块-->
                <div class="schedule-summary">概要——会议</div>
                <!--内容块-->
                <div class="schedule-content">会议</div>
            </div> 
        </div>
    </div>
    <script>
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');  // 月从0开始
        const day = String(today.getDate()).padStart(2, '0');
        const weekdays =  ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const weekday = weekdays[today.getDay()];
        const formatted = `${year}-${month}-${day}`;
        document.getElementById('weekday').innerText = weekday;
        document.getElementById('date').innerText =formatted;

        document.getElementById('add').onclick = function() {
            window.location.href = 'addTask.html';
        }
        document.getElementById('search').onclick = function() {
            window.location.href = 'completedTask.html';
        }
    </script>
    <script>
        let tasks = [];
        //页面加载完成后获取任务列表
        document.addEventListener('DOMContentLoaded', function() {
            fetchTasks();
        });
        //从后端获取任务列表的函数
        function fetchTasks() {
            fetch('http://localhost:8080/api/getTasks')
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        console.log('message:', data.message);
                        console.log('任务列表:', data.data);
                        tasks = data.data;
                        // 在这里可以将获取到的任务列表渲染到页面上
                    } else {
                        console.error('获取任务列表失败:', data.message);
                    }
                })
                .catch(error => console.error('请求错误:', error));
        }
        
    </script>
</body>
</html>
