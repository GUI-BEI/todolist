<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日程管理系统</title>
    <style>
        /*头部块，内涵.week-date-tools块*/
        .func-header {
            width: 100%;
            box-sizing: border-box;
            height: 60px;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        /*头部内的工具块，包含周数、日期和工具图标*/
        /*周数显示样式*/
        .func-header .week {
            /*左贴紧*/
            justify-self: start;
            grid-column: 1;
            font-weight: bold;
        }

        /*日期显示样式*/
        .func-header .full-date {
            /*居中*/
            justify-self: center;
            grid-column: 2;
            font-size: 18px;
        }

        /*工具图标样式*/
        .func-header .tools {
            /*右flex布局*/
            justify-self: right;
            display: flex;
            grid-column: 3;
            gap: 3px;
        }

        .func-header .tools .btn {
            /*按钮样式*/
            width: 30px;
            height: 30px;
            border-radius: 50%;
            /* 圆形 */
            background-color: #f0f0f0;
            /* 鲜艳底色 */
            color: rgb(0, 0, 0);
            font-size: 18px;
            font-weight: bold;
            display: inline-flex;
            /*文字居中*/
            align-items: center;
            justify-content: center;
            border: 3px solid rgb(63, 63, 63);
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
            /* 过渡效果 */
            outline: none;
            /* 去掉默认焦点轮廓 */
        }

        .func-header .tools .btn:active {
            opacity: 0.6;
            /* 透明度降低，看起来变淡 */
            transform: scale(0.98);
            /* 轻微缩小，增强按压感 */
        }

        /*中部块，内涵.calendar块,.schedule-list块*/
        .func-body {
            width: 100%;
            height: 700px;
            /*示例高度*/
            background-color: rgb(46, 89, 167);
            border-radius: 8px;
            position: relative;
        }

        /*日历条样式，内涵date-cell日期块*/
        .func-body .calendar {
            width: 100%;
            height: 50px;
            background-color: rgb(89, 118, 186);

            /*子块排列方式*/
            display: flex;
            flex-direction: row;
            /*让日期横向排列*/
            justify-content: space-between;
            /*日期之间平均分布*/
        }

        /*每个日期块样式，含星期、日期和月份*/
        .func-body .calendar .date-cell {
            background-color: rgb(89, 118, 186);
            flex-basis: 14%;
            /*每个日期占一周的1/7*/
            text-align: center;
            padding: 0.33%;
            /*增加内边距，即日期之间的间距*/
            display: flex;
            flex-direction: column;
            /*让星期、日期和月份垂直排列*/
            border-left: 1px solid #ccc;
            /*日期之间的分隔线*/
        }

        .func-body .calendar .date-cell.today {
            background-color: #ff0000;
            border: 1px solid rgb(255, 251, 0);
        }

        /*日程列表块样式，内涵.schedule-item日程项块*/
        .func-body .schedule-list {
            /*日程列表样式*/
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            background-image: url(17754068327512c7f6b870d76ea31f9c2f0b37c931503ce1c.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            overflow-y: auto;
            /*内容过多时显示滚动条*/
            scrollbar-width: none;
            /*滚动条隐藏保持美观*/
            contain: layout paint;
            padding: 20px 0px;
            /*内边距,只垂直方向*/
            position: relative;
        }

        /*日程项样式，内涵内容块*/
        .func-body .schedule-list .schedule-item {
            /*示例日程项样式*/
            background-color: rgba(96, 181, 255, 0.5);
            /*背景色，推荐和优先级相关*/
            height: 70px;
            width: 100%;
            /*日程项之间的间距*/
            margin-bottom: 5px;
            border-radius: 6px;
            /*内容块的水平排列*/
            display: flex;
            align-items: center;
        }

        /*日程项内的内容块*/
        .func-body .schedule-list .schedule-item .schedule-content {
            width: 100%;
            height: 70%;
            border-radius: 6px;
            background-color: rgba(111, 148, 205, 0.7);
            /*内容背景色，推荐和分类相关*/

            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            /* 显示行数限定为两行 */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 侧拉抽屉样式表 */
        .drawer {
            /* 固定位置 */
            position: fixed;
            /* 最上层 */
            z-index: 9999;
            /* 背景 透明度0.7 */
            background-color: rgba(236, 239, 250, 0.7);
            /* 初始隐藏 */
            visibility: hidden;
            /* 透明度 */
            opacity: 0;
            /* 平滑过渡 */
            transition: visibility 0.2s, opacity 0.2s;
            /* 左侧坐标 自动  因为右侧坐标根据弹出抽屉按钮的位置确定 */
            left: auto;
            /* 内边距 */
            padding: 5% 3% 3% 3%;
            /* 圆角 */
            border-radius: 15px;
        }

        /* 过滤器仪表盘 */
        .filterBar {
            display: column;
        }

        /* 过滤器按钮样式 */
        .filterBar .filter {
            border-color: #b3b5ec;
            /* 块元素 */
            display: block;
            /* 上 外边距 */
            margin-top: 10px;
            /* 下 外边距 */
            margin-bottom: 10px;
            /* 透明背景 */
            background: transparent;
            /* 内边距 */
            padding: 5px 10px 5px 10px;
            /* 字体大小 */
            font-size: 15px;
            /* 颜色 */
            background-color: rgb(203, 211, 231);
            /* 平滑过渡 */
            transition: background-color 0.2s;
            /* 圆角设置 */
            border-radius: 10px;
            /* 宽度 */
            width: 100%;
        }
    </style>
</head>

<body>
    <!--创建头部块，包含周数、日期和工具图标-->
    <header class="func-header">
        <span class="week" id="weekday"></span>
        <span class="full-date" id="date"></span>
        <span class="tools">
            <span class="btn" id="add">+</span>
            <span class="btn" id="filter">?</span>
            <span class="btn" id="more">...</span>
        </span>
    </header>
    <!--*创建中部块，包含日历条和日程列表-->
    <div class="func-body">
        <!--日历条，包含日期块-->
        <div class="calendar">
            <!--每个日期块包含星期、日期和月份-->
            <div class="date-cell">
                <span>周一</span>
                <span class="thisWeekDate"></span>
            </div>
            <div class="date-cell">
                <span>周二</span>
                <span class="thisWeekDate"></span>
            </div>
            <div class="date-cell">
                <span>周三</span>
                <span class="thisWeekDate"></span>
            </div>
            <div class="date-cell">
                <span>周四</span>
                <span class="thisWeekDate"></span>
            </div>
            <div class="date-cell">
                <span>周五</span>
                <span class="thisWeekDate"></span>
            </div>
            <div class="date-cell">
                <span>周六</span>
                <span class="thisWeekDate"></span>
            </div>
            <div class="date-cell">
                <span>周日</span>
                <span class="thisWeekDate"></span>
            </div>
        </div>
        <!--日程列表，包含多个日程项-->
        <div class="schedule-list">
            <!--每个日程项包含内容块-->
            <div class="schedule-item">
                <!--内容块-->
                <div class="schedule-content">会议</div>
            </div>
            <div class="schedule-item">
                <div class="schedule-content">上课</div>
            </div>
        </div>
        <!-- 侧拉抽屉，包含多种过滤器 -->
        <div class="drawer" id="drawer">
            <div class="filterBar">
                <span style="display:block; width: 100%; text-align: center;">筛选</span>
                <button class="filter" id="all">所有</button>
                <button class="filter" id="completed">已完成</button>
                <button class="filter" id="unCompleted">未完成</button>
                <button class="filter" id="high">高优先级</button>
                <button class="filter" id="medium">中优先级</button>
                <button class="filter" id="low">低优先级</button>
            </div>
        </div>
    </div>
    <script>
        //头顶工具栏
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');  // 月从0开始
        const day = String(today.getDate()).padStart(2, '0');
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const weekday = weekdays[today.getDay()];
        const formatted = `${year}-${month}-${day}`;
        document.getElementById('weekday').innerText = weekday;
        document.getElementById('date').innerText = formatted;

        const drawer = document.getElementById('drawer');

        document.getElementById('add').onclick = function () {//添加界面
            window.location.href = 'addTask.html';
        }

        document.getElementById('filter').onclick = function () {//统计界面
            window.location.href = 'filter.html';
        }

        document.getElementById('more').onclick = function () {//侧拉抽屉
            const rect = this.getBoundingClientRect();
            // 定位 按钮下方，右对齐按钮右侧
            drawer.style.top = (rect.bottom + window.scrollY) + 'px';
            drawer.style.right = (window.innerWidth - rect.right - window.scrollX) + 'px';
            drawer.style.left = 'auto';
            drawer.style.visibility = 'visible';
            drawer.style.opacity = '1';
        }

        // 隐藏抽屉
        function hideDrawer() {
            drawer.style.visibility = 'hidden';
            rawer.style.opacity = '0';
        }

        // 点击外部关闭抽屉
        document.addEventListener('click', function (e) {
            if (!drawer.contains(e.target) && e.target != document.getElementById('more')) {
                hideDrawer();
            }
        });


        //一周日期栏
        function getWeekDates() {
            const weekDates = [];
            let diff = today.getDay() == 0 ? -6 : 1 - today.getDay();//周一与当天的偏移量
            const firstDay = new Date(today);
            firstDay.setDate(today.getDate() + diff);//根据偏移量确定周一日期

            for (let i = 0; i < 7; ++i) {
                const day = new Date(firstDay);
                day.setDate(firstDay.getDate() + i);
                weekDates.push(day);//确认所有日期
            }
            return weekDates
        }

        function formatWeekDate(date) {
            const weekMonth = date.getMonth() + 1;
            const day = date.getDate();
            return `${weekMonth}/${day}`;//格式化为字符串
        }

        function fillWeekDates() {
            const cells = document.querySelectorAll('.date-cell');//获取七个天数块
            const weekDates = getWeekDates();//获取日期组

            cells.forEach((cell, index) => {
                const dateSpan = cell.querySelector('.thisWeekDate');
                if (dateSpan) {
                    dateSpan.textContent = formatWeekDate(weekDates[index]);//填充日期
                }
                if (weekDates[index].getDate() === today.getDate()) {
                    cell.classList.add('today')//判断处于当天的天数块，高亮显示
                }
            });
        }

        document.addEventListener('DOMContentLoaded', fillWeekDates);//渲染一周七天的日期


    </script>
    <script>
        const STORAGE_KEY = 'events';
        let tasks = [];
        let currentFilter = 'all';

        //页面加载完成后获取任务列表
        document.addEventListener('DOMContentLoaded', function () {
            fetchTasks();
        });

        // 绑定筛选按钮
        document.getElementById('all').addEventListener('click', () => {
            currentFilter = 'all';
            // render();
        });

        document.getElementById('completed').addEventListener('click', () => {
            currentFilter = 'completed';
            // render();
        });

        document.getElementById('unCompleted').addEventListener('click', () => {
            currentFilter = 'unCompleted';
            // render();
        });

        document.getElementById('high').addEventListener('click', () => {
            currentFilter = 'high';
            // render();
        });

        document.getElementById('medium').addEventListener('click', () => {
            currentFilter = 'medium';
            // render();
        });

        document.getElementById('low').addEventListener('click', () => {
            currentFilter = 'low';
            // render();
        });

        // 进行筛选 返回值是筛选后的容器
        function getTasks() {
            switch (currentFilter) {
                case 'unCompleted': return tasks.filter(t => !t.completed);
                case 'completed': return tasks.filter(t => t.completed);
                case 'high': return tasks.filter(t => t.priority == 3);
                case 'medium': return tasks.filter(t => t.priority == 2);
                case 'low': return tasks.filter(t => t.priority == 1);
                default: return tasks;
            }
        }

        //从后端获取任务列表的函数
        function fetchTasks() {
            fetch('http://localhost:8080/api/getTasks')
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        console.log('message:', data.message);
                        console.log('任务列表:', data.data);
                        const newTaskList = data.data;
                        // 在这里可以将获取到的任务列表渲染到页面上，完成渲染后，续到tasks数组
                        newTaskList.forEach(item => {
                            const title = item.title;
                            const description = item.description;
                            const startDate = item.start;    // 格式 "2026-04-15"
                            const endDate = item.end;        // 格式 "2026-04-16"
                            const priority = item.priority;
                            const type = item.type;
                            const completed = item.completed;

                            //优先级应当影响事务块背景色
                            //分类应当影响内容块背景色
                            //是否完成应当影响排序和所有背景色，完成的会排到最下面，并且完全灰掉
                            //TODO

                            //事务块背景色设置
                            const itemBlock = document.createElement('div');
                            itemBlock.className = 'schedule-item';

                            //内容块依次实现背景色和内容
                            const content = document.createElement('div');
                            content.className = 'schedule-content';
                            //TODO
                            //填充文本
                            content.textContent = formatDate(startDate) + '->' + formatDate(endDate)
                                + ' ' + title + ':' + description;

                            const scheduleList = document.querySelector('.schedule-list');
                            itemBlock.appendChild(content);
                            scheduleList.appendChild(itemBlock);
                            tasks = tasks.concat(newTaskList);
                        });
                    } else {
                        console.error('获取任务列表失败:', data.message);
                    }
                })
                .catch(error => console.error('请求错误:', error));
        }
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
        }
    </script>
</body>

</html>
